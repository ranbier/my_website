<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My First Website</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero">
      <p class="eyebrow">GitHub connected website starter</p>
      <h1>내 웹사이트를 시작해보자</h1>
      <p class="description">
        이 페이지는 바로 수정해서 사용할 수 있는 기본 시작점입니다. 제목, 소개 문구,
        버튼 링크만 바꿔도 간단한 개인 사이트로 쓸 수 있어요.
      </p>
      <div class="actions">
        <a class="button primary" href="https://github.com/" target="_blank" rel="noreferrer">
          GitHub 보기
        </a>
        <a class="button secondary" href="#about">소개 보기</a>
      </div>
    </main>

    <section class="about" id="about">
      <div class="card">
        <h2>어떻게 수정하면 되나요?</h2>
        <p>
          <code>index.html</code>에서 글자를 바꾸고, <code>styles.css</code>에서 색상과
          레이아웃을 조정하면 됩니다.
        </p>
      </div>
      <div class="card">
        <h2>다음 단계</h2>
        <p>
          GitHub 저장소를 연결한 뒤 커밋하고 푸시하면 배포 준비가 거의 끝납니다.
        </p>
      </div>
    </section>
  </body>
</html>
